<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#100F17" />
<meta name="description" content="Личный трекер аниме — что смотрю, что посмотрел, что в планах." />

<title>Что смотрю — трекер аниме</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* Prevents a white flash before the app's own CSS-in-JS mounts */
  html, body { background: #100F17; }
  #root:empty::before {
    content: "";
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
</style>

<!-- React 18 (UMD builds via CDN — cached by the device after first load) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel Standalone: compiles the JSX below directly in the browser, no build step.
     Pinned to @7 — v8 defaults preset-react's JSX runtime to "automatic", which
     injects a literal `import` into the compiled output and breaks classic <script> tags. -->
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root">
  <div id="fallback-message" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#9C96AF;font-family:sans-serif;padding:24px;text-align:center;">
    <div style="width:28px;height:28px;border-radius:50%;border:2px solid #2A2735;border-top-color:#E8A94C;animation:spin 0.8s linear infinite;"></div>
    <p>Загрузка приложения...</p>
    <p style="font-size:12px;opacity:0.6;" id="fallback-hint"></p>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
  // Surface any runtime JS error directly on screen — a script tag's onerror
  // attribute only fires for network failures, not execution errors, so
  // without this a broken app.js would leave the fallback spinner stuck forever.
  window.addEventListener("error", function (e) {
    var hint = document.getElementById("fallback-hint");
    if (hint) {
      hint.textContent = "Ошибка: " + (e.message || "неизвестная ошибка") +
        (e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : "");
    }
  });
</script>

<script src="icons.js" onerror="document.getElementById('fallback-hint').textContent='Ошибка сети: не удалось загрузить icons.js'"></script>
<script type="text/babel" data-presets="react" src="app.js" onerror="document.getElementById('fallback-hint').textContent='Ошибка сети: не удалось загрузить app.js'"></script>

<script>
  // Register the service worker for offline support once the app is served
  // over http(s) (this is skipped automatically on file:// during local testing).
  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
